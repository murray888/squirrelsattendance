<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Squirrels Parent Attendance Tracker (Google Sheets)</title>
    <style>
        :root {
            --primary-color: #5c3c92;
            --secondary-color: #e2d8ee;
            --warning-color: #d9534f;
            --success-color: #5cb85c;
            --text-color: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f7f5fa;
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        h1 {
            color: var(--primary-color);
            margin-top: 0;
            border-bottom: 2px solid var(--secondary-color);
            padding-bottom: 10px;
        }

        .form-group {
            display: grid;
            grid-template-columns: 2fr 1.5fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
            align-items: flex-end;
        }

        @media (max-width: 600px) {
            .form-group {
                grid-template-columns: 1fr;
            }
        }

        label {
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
        }

        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
            background-color: white;
            height: 44px;
        }

        #otherNameWrapper {
            margin-top: 10px;
            display: none;
        }

        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 11px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: background 0.2s;
            height: 44px;
        }

        button:hover {
            background-color: #4a3075;
        }

        .warning-banner {
            background-color: #fdf2f2;
            border-left: 5px solid var(--warning-color);
            color: #b91c1c;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 4px;
            display: none;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        th {
            background-color: var(--secondary-color);
            color: var(--primary-color);
        }

        .status-badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 14px;
            font-weight: bold;
        }

        .status-ok {
            background-color: #e6f4ea;
            color: #137333;
        }

        .status-warn {
            background-color: #fce8e6;
            color: var(--warning-color);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Squirrels Attendance Tracker</h1>
    <p>Data links directly to your Google Sheet on Drive.</p>

    <div id="warningBanner" class="warning-banner">
        <h3>⚠️ Attendance Warning</h3>
        <span id="warningMessage"></span>
    </div>

    <div class="form-group">
        <div>
            <label for="parentSelect">Select Parent</label>
            <select id="parentSelect" onchange="toggleOtherInput()">
                <option value="">-- Choose a parent --</option>
            </select>
            <div id="otherNameWrapper">
                <input type="text" id="otherName" placeholder="Type parent's full name">
            </div>
        </div>
        <div>
            <label for="sessionDate">Session Date</label>
            <input type="date" id="sessionDate" required>
        </div>
        <div>
            <button id="submitBtn" onclick="addAttendance()">Add Visit</button>
        </div>
    </div>

    <h2>Upcoming & Past Logs</h2>
    <table>
        <thead>
            <tr>
                <th>Parent Name</th>
                <th>Date</th>
                <th>30-Day Window Count</th>
            </tr>
        </thead>
        <tbody id="attendanceTableBody">
            <tr><td colspan="3" style="text-align:center; color:#999;">Fetching Google Sheet data...</td></tr>
        </tbody>
    </table>
</div>

<script>
    // 🔴 STEP 3: PASTE YOUR STEIN API URL HERE 👇
    const STEIN_API_URL = https://api.steinhq.com/v1/storages/6a46cd0d92b1163e9713c2e0;

    const parentList = ["Charlotte Stamp", "Jemma Markham", "Kat Ettridge", "Lucy Gleisner", "Michaela Whybrow", "Sarah Floyd", "Sarah Stallard", "Hugh Floyd"];
    let attendanceRecords = [];

    document.getElementById('sessionDate').valueAsDate = new Date();
    populateDropdown();
    fetchSheetData();

    function populateDropdown() {
        const select = document.getElementById('parentSelect');
        [...parentList].sort((a, b) => a.localeCompare(b)).forEach(parent => {
            const opt = document.createElement('option');
            opt.value = parent; opt.textContent = parent;
            select.appendChild(opt);
        });
        const otherOpt = document.createElement('option');
        otherOpt.value = "Other"; otherOpt.textContent = "Other...";
        select.appendChild(otherOpt);
    }

    function toggleOtherInput() {
        const select = document.getElementById('parentSelect');
        const wrapper = document.getElementById('otherNameWrapper');
        if (select.value === "Other") {
            wrapper.style.display = 'block';
            document.getElementById('otherName').focus();
        } else {
            wrapper.style.display = 'none';
        }
    }

    async function fetchSheetData() {
        try {
            const response = await fetch(`${STEIN_API_URL}/Sheet1`);
            attendanceRecords = await response.json();
            // Sort entries by date descending
            attendanceRecords.sort((a, b) => new Date(b.date) - new Date(a.date));
            updateTable();
        } catch (error) {
            console.error("Error fetching data:", error);
            document.getElementById('attendanceTableBody').innerHTML = `<tr><td colspan="3" style="text-align:center; color:red;">Failed to load data. Check URL.</td></tr>`;
        }
    }

    async function addAttendance() {
        const select = document.getElementById('parentSelect');
        const otherInput = document.getElementById('otherName');
        const dateInput = document.getElementById('sessionDate');
        const submitBtn = document.getElementById('submitBtn');

        let name = select.value === "Other" ? otherInput.value.trim() : select.value;
        const date = dateInput.value;

        if (!name || !date) {
            alert("Please complete fields."); return;
        }

        const count = getRollingCount(name, date);
        if (count >= 3) {
            const banner = document.getElementById('warningBanner');
            document.getElementById('warningMessage').innerText = `${name} has ${count} visits in this 30-day window.`;
            banner.style.display = 'block';
            if (!confirm(`${name} will exceed 3 visits in a rolling 30 days. Log anyway?`)) return;
            banner.style.display = 'none';
        }

        submitBtn.disabled = true;
        submitBtn.innerText = "Saving...";

        // Send row object data to Google Sheet
        try {
            await fetch(`${STEIN_API_URL}/Sheet1`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify([{ name: name, date: date }])
            });
            
            // Refresh application UI
            select.value = ''; otherInput.value = '';
            document.getElementById('otherNameWrapper').style.display = 'none';
            await fetchSheetData();
        } catch (error) {
            alert("Error saving data!");
        } finally {
            submitBtn.disabled = false;
            submitBtn.innerText = "Add Visit";
        }
    }

    function getRollingCount(parentName, targetDate) {
        const target = new Date(targetDate);
        return attendanceRecords.filter(r => r.name && r.name.toLowerCase() === parentName.toLowerCase() && 
            Math.ceil(Math.abs(target - new Date(r.date)) / (1000 * 60 * 60 * 24)) <= 30
        ).length;
    }

    function updateTable() {
        const tbody = document.getElementById('attendanceTableBody');
        tbody.innerHTML = '';
        if (attendanceRecords.length === 0 || !attendanceRecords[0].name) {
            tbody.innerHTML = `<tr><td colspan="3" style="text-align:center; color:#999;">No entries yet.</td></tr>`;
            return;
        }
        attendanceRecords.forEach(record => {
            if(!record.name) return;
            const currentCount = getRollingCount(record.name, record.date);
            tbody.innerHTML += `
                <tr>
                    <td><strong>${record.name}</strong></td>
                    <td>${new Date(record.date).toLocaleDateString(undefined, {year:'numeric', month:'short', day:'numeric'})}</td>
                    <td><span class="status-badge ${currentCount > 3 ? 'status-warn' : 'status-ok'}">${currentCount} visits</span></td>
                </tr>`;
        });
    }
</script>
</body>
</html>
