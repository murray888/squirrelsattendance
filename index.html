<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Squirrels Parent Attendance Tracker</title>
    <style>
        :root {
            --primary-color: #5c3c92;
            --secondary-color: #e2d8ee;
            --warning-color: #d9534f;
            --success-color: #5cb85c;
            --text-color: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f7f5fa;
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        h1 {
            color: var(--primary-color);
            margin-top: 0;
            border-bottom: 2px solid var(--secondary-color);
            padding-bottom: 10px;
        }

        .form-group {
            display: grid;
            grid-template-columns: 2fr 1.5fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
            align-items: flex-end;
        }

        @media (max-width: 600px) {
            .form-group {
                grid-template-columns: 1fr;
            }
        }

        label {
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
        }

        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
            background-color: white;
            height: 44px;
        }

        #otherNameWrapper {
            margin-top: 10px;
            display: none;
        }

        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 11px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: background 0.2s;
            height: 44px;
        }

        button:hover {
            background-color: #4a3075;
        }

        .warning-banner {
            background-color: #fdf2f2;
            border-left: 5px solid var(--warning-color);
            color: #b91c1c;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 4px;
            display: none;
        }

        .tables-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            margin-top: 20px;
        }

        @media (max-width: 768px) {
            .tables-grid {
                grid-template-columns: 1fr;
            }
        }

        h2 {
            color: var(--primary-color);
            font-size: 20px;
            margin-bottom: 10px;
            border-bottom: 1px solid var(--secondary-color);
            padding-bottom: 5px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }

        th, td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #eee;
            font-size: 15px;
        }

        th {
            background-color: var(--secondary-color);
            color: var(--primary-color);
        }

        .status-badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 13px;
            font-weight: bold;
        }

        .status-ok {
            background-color: #e6f4ea;
            color: #137333;
        }

        .status-warn {
            background-color: #fce8e6;
            color: var(--warning-color);
        }

        .session-group {
            margin-bottom: 15px;
            background: #fdfbfd;
            border: 1px solid #eae5f0;
            border-radius: 6px;
            padding: 12px;
        }

        .session-date {
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 5px;
        }

        .session-parents {
            margin: 0;
            padding-left: 20px;
            color: #555;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Squirrels Attendance Tracker</h1>
    <p>Manage parent rosters, review rolling limits, and view session manifests.</p>

    <div id="warningBanner" class="warning-banner">
        <h3>⚠️ Attendance Warning</h3>
        <span id="warningMessage"></span>
    </div>

    <div class="form-group">
        <div>
            <label for="parentSelect">Select Parent</label>
            <select id="parentSelect" onchange="toggleOtherInput()">
                <option value="">Loading list...</option>
            </select>
            <div id="otherNameWrapper">
                <input type="text" id="otherName" placeholder="Type new parent's full name">
            </div>
        </div>
        <div>
            <label for="sessionDate">Session Date</label>
            <input type="date" id="sessionDate" required>
        </div>
        <div>
            <button id="submitBtn" onclick="addAttendance()">Add Visit</button>
        </div>
    </div>

    <div class="tables-grid">
        <div>
            <h2>Parent Summary (Rolling 30 Days)</h2>
            <table>
                <thead>
                    <tr>
                        <th>Parent Name</th>
                        <th>Active Window Count</th>
                    </tr>
                </thead>
                <tbody id="summaryTableBody">
                    <tr><td colspan="2" style="text-align:center; color:#999;">Loading summary...</td></tr>
                </tbody>
            </table>
        </div>

        <div>
            <h2>Sessions Roster Breakdown</h2>
            <div id="sessionsRosterContainer">
                <p style="color:#999; text-align:center;">Loading session rosters...</p>
            </div>
        </div>
    </div>
</div>

<script>
    // 🔴 PASTE YOUR STEIN API URL HERE 👇
    const STEIN_API_URL = "https://api.steinhq.com/v1/storages/6a46cd0d92b1163e9713c2e0";

    let parentList = [];
    let attendanceRecords = [];

    document.getElementById('sessionDate').valueAsDate = new Date();
    initApp();

    async function initApp() {
        await fetchParentList();
        await fetchSheetData();
    }

    async function fetchParentList() {
        try {
            const response = await fetch(`${STEIN_API_URL}/Parents`);
            const data = await response.json();
            parentList = data.map(p => p.name).filter(name => name);
            populateDropdown();
        } catch (error) {
            console.error("Error loading parents list:", error);
        }
    }

    function populateDropdown() {
        const select = document.getElementById('parentSelect');
        select.innerHTML = '<option value="">-- Choose a parent --</option>';
        [...parentList].sort((a, b) => a.localeCompare(b)).forEach(parent => {
            const opt = document.createElement('option');
            opt.value = parent; opt.textContent = parent;
            select.appendChild(opt);
        });
        const otherOpt = document.createElement('option');
        otherOpt.value = "Other"; otherOpt.textContent = "Other...";
        select.appendChild(otherOpt);
    }

    function toggleOtherInput() {
        const select = document.getElementById('parentSelect');
        const wrapper = document.getElementById('otherNameWrapper');
        if (select.value === "Other") {
            wrapper.style.display = 'block';
            document.getElementById('otherName').focus();
        } else {
            wrapper.style.display = 'none';
        }
    }

    async function fetchSheetData() {
        try {
            const response = await fetch(`${STEIN_API_URL}/Sheet1`);
            attendanceRecords = await response.json();
            attendanceRecords = attendanceRecords.filter(r => r.name && r.date);
            updateUI();
        } catch (error) {
            console.error("Error fetching attendance:", error);
        }
    }

    async function addAttendance() {
        const select = document.getElementById('parentSelect');
        const otherInput = document.getElementById('otherName');
        const dateInput = document.getElementById('sessionDate');
        const submitBtn = document.getElementById('submitBtn');

        let isNewParent = (select.value === "Other");
        let name = isNewParent ? otherInput.value.trim() : select.value;
        const date = dateInput.value;

        if (!name || !date) {
            alert("Please complete fields."); return;
        }

        const count = getRollingCountForDate(name, date);
        if (count >= 3) {
            const banner = document.getElementById('warningBanner');
            document.getElementById('warningMessage').innerText = `${name} has ${count} visits in this 30-day window.`;
            banner.style.display = 'block';
            if (!confirm(`${name} will exceed 3 visits in a rolling 30 days. Log anyway?`)) return;
            banner.style.display = 'none';
        }

        submitBtn.disabled = true;
        submitBtn.innerText = "Saving...";

        try {
            if (isNewParent) {
                await fetch(`${STEIN_API_URL}/Parents`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify([{ name: name }])
                });
            }

            await fetch(`${STEIN_API_URL}/Sheet1`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify([{ name: name, date: date }])
            });
            
            select.value = ''; otherInput.value = '';
            document.getElementById('otherNameWrapper').style.display = 'none';
            await initApp();
        } catch (error) {
            alert("Error saving data!");
        } finally {
            submitBtn.disabled = false;
            submitBtn.innerText = "Add Visit";
        }
    }

    // Helper: Count for a theoretical point in time (for form warnings)
    function getRollingCountForDate(parentName, targetDate) {
        const target = new Date(targetDate);
        return attendanceRecords.filter(r => r.name.toLowerCase() === parentName.toLowerCase() && 
            Math.ceil(Math.abs(target - new Date(r.date)) / (1000 * 60 * 60 * 24)) <= 30
        ).length;
    }

    // Helper: Count relative to *today* (for the Summary Table status)
    function getCurrentRollingCount(parentName) {
        const today = new Date();
        return attendanceRecords.filter(r => r.name.toLowerCase() === parentName.toLowerCase() && 
            Math.ceil(Math.abs(today - new Date(r.date)) / (1000 * 60 * 60 * 24)) <= 30
        ).length;
    }

    function updateUI() {
        updateSummaryTable();
        updateSessionsLog();
    }

    function updateSummaryTable() {
        const tbody = document.getElementById('summary
